<!DOCTYPE html>
<html>
<head>
  <title>GameBlox Dashboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <h1>📊 Dashboard</h1>

    <div class="grid">
      <div class="card">
        <h2>Bot Status</h2>
        <p id="status">Loading...</p>
      </div>

      <div class="card">
        <h2>Uptime</h2>
        <p id="uptime">Loading...</p>
      </div>

      <div class="card">
        <h2>Servers</h2>
        <p id="servers">Loading...</p>
      </div>

      <div class="card">
        <h2>Users</h2>
        <p id="users">Loading...</p>
      </div>
    </div>

    <div class="card">
      <h2>Controls</h2>
      <button class="btn">Restart Bot (coming soon)</button>
      <button class="btn">Refresh Stats</button>
    </div>
  </div>

  <script src="/dashboard.js"></script>
</body>
</html>
