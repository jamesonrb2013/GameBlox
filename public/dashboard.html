<!DOCTYPE html>
<html>
<head>
  <title>GameBlox Dashboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">

    <h1>📊 GameBlox Dashboard</h1>

    <!-- USER PANEL -->
    <div class="card" id="userCard">
      <h2>👤 Logged In</h2>
      <p id="userInfo">Loading user...</p>
      <a class="btn" href="/logout">Logout</a>
    </div>

    <!-- STATS -->
    <div class="grid">

      <div class="card">
        <h2>Status</h2>
        <p id="status">Loading...</p>
      </div>

      <div class="card">
        <h2>Uptime</h2>
        <p id="uptime">Loading...</p>
      </div>

      <div class="card">
        <h2>Servers</h2>
        <p id="servers">Loading...</p>
      </div>

      <div class="card">
        <h2>Users</h2>
        <p id="users">Loading...</p>
      </div>

    </div>

<!-- ADMIN PANEL -->
<div class="card" id="adminPanel" style="display:none;">
  <h2>🛡 Admin Controls</h2>

  <p>XP System: <span id="xpStatus">Loading...</span></p>
<p>Automod: <span id="automodStatus">Loading...</span></p>

  <button class="btn" id="toggleXP">Toggle XP</button>
  <button class="btn" id="toggleAutomod">Toggle Automod</button>
  <button class="btn" id="restartBot">🔄 Restart Bot</button>

  <p id="adminStatus">Loading controls...</p>
</div>

  </div>

  <script src="/dashboard.js"></script>
</body>
</html>
