<!DOCTYPE html>
<html>
<head>
  <title>GameBlox Dashboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">

    <h1>📊 GameBlox Dashboard</h1>

    <!-- USER PANEL -->
    <div class="card" id="userCard">
      <h2>👤 Logged In</h2>
      <p id="userInfo">Loading user...</p>
      <a class="btn" href="/logout">Logout</a>
    </div>

    <!-- STATS -->
    <div class="grid">

      <div class="card">
        <h2>Status</h2>
        <p id="status">Loading...</p>
      </div>

      <div class="card">
        <h2>Uptime</h2>
        <p id="uptime">Loading...</p>
      </div>

      <div class="card">
        <h2>Servers</h2>
        <p id="servers">Loading...</p>
      </div>

      <div class="card">
        <h2>Users</h2>
        <p id="users">Loading...</p>
      </div>

    </div>

    <!-- ADMIN PANEL -->
    <div class="card" id="adminPanel" style="display:none;">
      <h2>🔧 Admin Controls</h2>

      <button class="btn">Restart Bot</button>
      <button class="btn">Reload Commands</button>
      <button class="btn">Clear Cache</button>

      <p style="opacity:0.6;">Owner-only section</p>
    </div>

  </div>

  <script src="/dashboard.js"></script>
</body>
</html>
